<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0f0f5"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Badge -->
  <rect x="460" y="120" width="280" height="36" rx="18" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="144" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#a78bfa" text-anchor="middle">Live Tracker · Updated 2026</text>

  <!-- Title -->
  <text x="600" y="230" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="900" fill="url(#title)" text-anchor="middle" letter-spacing="-1">The AI Arms Race</text>

  <!-- Subtitle -->
  <text x="600" y="280" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#a0a0b8" text-anchor="middle">Who's Spending the Most on Artificial Intelligence?</text>

  <!-- Stats -->
  <text x="280" y="380" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="#f0f0f5" text-anchor="middle">$473B+</text>
  <text x="280" y="415" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b6b80" text-anchor="middle" letter-spacing="2">TOTAL AI CAPEX</text>

  <text x="600" y="380" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="#f0f0f5" text-anchor="middle">38</text>
  <text x="600" y="415" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b6b80" text-anchor="middle" letter-spacing="2">COMPANIES TRACKED</text>

  <text x="920" y="380" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="#f0f0f5" text-anchor="middle">7</text>
  <text x="920" y="415" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b6b80" text-anchor="middle" letter-spacing="2">CATEGORIES</text>

  <!-- URL -->
  <text x="600" y="550" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#7c3aed" text-anchor="middle">aisight.fyi</text>
