<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="alternate" type="application/rss+xml" title="AISight" href="/feed.xml">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237c3aed' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M3 3v18h18'/><path d='M18.7 8l-5.1 5.2-2.8-2.7L7 14.3'/></svg>">
</head>
<body class="bg-grid">
  <nav class="top-nav" id="top-nav">
    <div class="top-nav-inner">
      <a href="/" class="nav-logo"><span class="nav-logo-text">AISight</span></a>
      <div class="nav-links" id="nav-links">
        <a href="/" class="nav-link">Leaderboard</a>
        <a href="/news" class="nav-link">News</a>
        <a href="/compare" class="nav-link">Compare</a>
        <a href="/trends" class="nav-link">Trends</a>
        <div class="nav-dropdown">
          <button class="nav-dropdown-toggle active" aria-expanded="false">Insights <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></button>
          <div class="nav-dropdown-menu">
            <a href="/map" class="nav-link">Map</a>
            <a href="/sector" class="nav-link">Sector</a>
            <a href="/weekly" class="nav-link active">Weekly</a>
            <a href="/quiz" class="nav-link">Quiz</a>
            <a href="/api" class="nav-link">API</a>
          </div>
        </div>
        <a href="/about" class="nav-link">About</a>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <main class="main-content" style="max-width:800px;">
    <div style="text-align:center;margin-bottom:40px;">
      <h1 style="font-size:2rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:8px;">Weekly Report</h1>
      <p style="color:var(--muted-foreground);font-size:0.95rem;">What changed this week in AI spending data</p>
    </div>
    <div id="weekly-content"><div class="loading">Loading...</div></div>
  </main>

  <footer class="footer">
    <nav class="footer-links"><a href="/">Leaderboard</a><a href="/news">AI News</a><a href="/about">About</a></nav>
    <p style="margin-top:16px;">Data from SEC EDGAR, earnings calls, and analyst reports.</p>
  </footer>

  <script src="/js/nav.js"></script>
  <script src="/js/data.js"></script>
  <script>
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function sanitizeUrl(url) {
    if (!url) return '#';
    const s = String(url).trim();
    if (s.startsWith('/') || s.startsWith('http://') || s.startsWith('https://')) return escapeHtml(s);
    return '#';
  }
  (async function() {
    let weekly;
    try {
      const res = await fetch('/data/weekly.json');
      weekly = await res.json();
    } catch {
      document.getElementById('weekly-content').innerHTML = '<p style="color:var(--muted-foreground);">No weekly report available yet.</p>';
      return;
    }

    const content = document.getElementById('weekly-content');
    const weekDate = new Date(weekly.weekOf);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    const changeIcons = {
      new: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--violet-400)" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>',
      marketcap: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted-foreground)" stroke-width="2"><path d="M2.25 18L9 11.25l4.306 4.306a11.95 11.95 0 015.814-5.518l2.74-1.22"/></svg>',
      capex: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--violet-400)" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
    };

    content.innerHTML = `
      <div style="display:flex;gap:12px;margin-bottom:24px;">
        <div class="stat-card" style="flex:1;text-align:center;">
          <div class="stat-value">${escapeHtml(weekly.summary.totalChanges)}</div>
          <div class="stat-label">Data Changes</div>
        </div>
        <div class="stat-card" style="flex:1;text-align:center;">
          <div class="stat-value">${escapeHtml(weekly.summary.newsArticles)}</div>
          <div class="stat-label">News Articles</div>
        </div>
        <div class="stat-card" style="flex:1;text-align:center;">
          <div class="stat-value">${escapeHtml(weekly.summary.companiesTracked)}</div>
          <div class="stat-label">Companies</div>
        </div>
      </div>

      <p style="font-size:0.8rem;color:var(--muted-foreground);margin-bottom:20px;">
        Week of ${months[weekDate.getMonth()]} ${weekDate.getDate()}, ${weekDate.getFullYear()} · Generated ${new Date(weekly.generated).toLocaleDateString()}
      </p>

      ${weekly.changes.length > 0 ? `
        <h2 style="font-size:1rem;font-weight:700;margin-bottom:12px;">Changes</h2>
        <div style="display:flex;flex-direction:column;gap:6px;">
          ${weekly.changes.filter(c => c.type !== 'new').map(c => `
            <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);">
              ${changeIcons[c.type] || ''}
              <span style="font-weight:600;min-width:100px;">${escapeHtml(c.company)}</span>
              <span style="color:var(--muted-foreground);font-size:0.85rem;">${escapeHtml(c.detail)}</span>
            </div>
          `).join('')}
        </div>
      ` : '<p style="color:var(--muted-foreground);">No significant changes this week.</p>'}
    `;
  })();
  </script>
</body>
</html>
