name: Daily Data Update

on:
  schedule:
    # Her gün 3 kez: 08:00, 14:00, 20:00 UTC
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch: # Manuel tetikleme

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Fetch latest news
        working-directory: scripts
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: node daily-news.js

      - name: Update market cap data
        working-directory: scripts
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: node fetch-capex.js

      - name: Generate RSS feed
        working-directory: scripts
        run: node generate-rss.js

      - name: Validate fetched data
        run: |
          node -e "const d=JSON.parse(require('fs').readFileSync('data/companies.json','utf8')); if(!d.companies||d.companies.length<30) throw new Error('Data validation failed: too few companies'); console.log('companies.json valid:',d.companies.length,'companies');"
          node -e "JSON.parse(require('fs').readFileSync('data/news.json','utf8')); console.log('news.json valid');"

      - name: Update last updated timestamp
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M)
          sed -i "s/\"lastUpdated\": \"[^\"]*\"/\"lastUpdated\": \"$NOW\"/" data/companies.json

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ feed.xml 2>/dev/null && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ feed.xml
          git commit -m "chore: daily news update $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to Vercel
        if: steps.changes.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --token=$VERCEL_TOKEN --yes
